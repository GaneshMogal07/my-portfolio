databases:
  - name: portfolio-db
    databaseName: portfolio_app
    user: portfolio_user
    plan: free

services:
  - type: web
    name: ganesh-portfolio
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
        placeholder: "Paste your Laravel APP_KEY (e.g. base64:6PSkNl8...)"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: portfolio-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: portfolio-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password
      - key: RUN_MIGRATIONS
        value: "true"
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        value: mogalg71@gmail.com
      - key: MAIL_PASSWORD
        value: "kzil ojjp hvxs nrjk"
      - key: MAIL_FROM_ADDRESS
        value: mogalg71@gmail.com
      - key: MAIL_FROM_NAME
        value: "Ganesh Mogal"
      - key: MAIL_VERIFY_PEER
        value: "false"
